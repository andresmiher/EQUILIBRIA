<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/6054/6054422.png">
    <title>EQUILIBRIA</title>
    <style>
        :root {
            --ios-blue: #007AFF; --ios-green: #34C759; --ios-red: #FF3B30;
            --ios-gray: #8E8E93; --ios-bg: #F2F2F7; --ios-card: #FFFFFF;
        }
        @media (prefers-color-scheme: dark) {
            :root { --ios-bg: #000000; --ios-card: #1C1C1E; }
            body { color: white; }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--ios-bg); padding-top: env(safe-area-inset-top); height: 100vh; overflow: hidden; }
        
        .view { display: none; height: 100vh; padding: 20px; overflow-y: auto; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER & SIDEBAR */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .menu-btn { font-size: 28px; cursor: pointer; color: var(--ios-blue); padding: 5px; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 60px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
        .sidebar.open { left: 0; }
        .sidebar-item { padding: 18px 0; border-bottom: 0.5px solid rgba(0,0,0,0.1); font-size: 17px; font-weight: 500; color: var(--ios-blue); display: flex; align-items: center; gap: 10px; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 900; }

        /* CARDS & UI */
        .card { background: var(--ios-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .budget-big { font-size: 54px; font-weight: 800; color: var(--ios-green); letter-spacing: -3px; margin: 5px 0; }
        .label { font-size: 11px; text-transform: uppercase; color: var(--ios-gray); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; display: block; }

        .btn { background: var(--ios-blue); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .btn-sec { background: rgba(142,142,147,0.15); color: var(--ios-blue); margin-top: 10px; }
        
        /* SELECTORS DINÁMICOS */
        .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin: 15px 0; }
        .sel-btn { padding: 12px 5px; border-radius: 12px; border: 2.5px solid transparent; background: rgba(142,142,147,0.1); text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; color: var(--ios-gray); }
        .sel-btn.active { border-color: var(--ios-blue); background: rgba(0,122,255,0.1); color: var(--ios-blue); }

        .currency-input { font-size: 44px !important; font-weight: 800 !important; text-align: center; color: var(--ios-blue); background: transparent !important; border-bottom: 2px solid var(--ios-blue) !important; border-radius: 0 !important; width: 100%; outline: none; border: none; margin: 15px 0; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 15px; border-radius: 12px; border: none; background: rgba(0,0,0,0.05); font-size: 16px; margin-bottom: 10px; outline: none; }

        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:2000; color: white; font-weight: 600; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader">Sincronizando...</div>
    <div class="sidebar-overlay" id="overlay" onclick="app.toggleMenu()"></div>
    
    <div class="sidebar" id="sidebar">
        <h2 style="margin-bottom: 30px; font-weight: 800; letter-spacing: -1px;">EQUILIBRIA</h2>
        <div class="sidebar-item" onclick="app.showView('view-main'); app.toggleMenu();">📊 Dashboard Principal</div>
        <div class="sidebar-item" onclick="app.showView('view-metodos'); app.toggleMenu();">💳 Medios de Pago</div>
        <div class="sidebar-item" onclick="app.logout()" style="color: var(--ios-red); margin-top: 50px;">🚪 Cerrar Sesión</div>
    </div>

    <div id="view-login" class="view active">
        <div class="header" style="margin-top: 50px;"><h1>Equilibria</h1><p>Arquitectura de Ahorro.</p></div>
        <div class="card">
            <input type="email" id="l-email" placeholder="Correo electrónico">
            <button class="btn" onclick="app.login()">Entrar a mi Bóveda</button>
        </div>
    </div>

    <div id="view-main" class="view">
        <div class="top-nav">
            <div class="menu-btn" onclick="app.toggleMenu()">≡</div>
            <div id="t-date" style="font-weight: 700; font-size: 14px; text-transform: uppercase;">--</div>
            <div style="width: 35px;"></div>
        </div>
        
        <div class="card" style="text-align: center; margin-top: 15px; padding: 30px 20px;">
            <span class="label">Presupuesto para hoy</span>
            <div id="d-budget" class="budget-big">$0.00</div>
            <div id="c-info" style="font-size: 13px; color: var(--ios-gray); font-weight: 600;"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
            <div class="card" style="margin:0; padding:15px; text-align:center;">
                <span class="label">Ahorro Meta</span>
                <div style="font-size:20px; font-weight:800; color:var(--ios-blue);" id="v-savings">$0</div>
            </div>
            <div class="card" style="margin:0; padding:15px; text-align:center;">
                <span class="label">Para Gastar (Mes)</span>
                <div style="font-size:20px; font-weight:800;" id="v-available">$0</div>
            </div>
        </div>

        <div class="card" style="padding: 15px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="label">Progreso del Gasto</span>
                <div id="v-spent" style="font-weight: 800; color: var(--ios-red);">$0</div>
            </div>
            <div style="height: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; margin-top: 10px; overflow: hidden;">
                <div id="p-bar" style="height: 100%; background: var(--ios-red); width: 0%; transition: 0.5s;"></div>
            </div>
        </div>

        <button class="btn" style="height: 80px; font-size: 20px;" onclick="app.showView('view-gasto')">＋ Registrar Gasto</button>
    </div>

    <div id="view-metodos" class="view">
        <div class="top-nav">
            <div class="menu-btn" onclick="app.toggleMenu()">≡</div>
            <h1>Cuentas</h1>
        </div>
        <div id="list-metodos"></div>
        <div class="card">
            <span class="label">Añadir Medio de Pago</span>
            <input type="text" id="m-nombre" placeholder="Nombre (ej. Banamex Crédito)">
            <select id="m-tipo">
                <option value="💳 Crédito">💳 Crédito</option>
                <option value="🏦 Débito">🏦 Débito</option>
                <option value="💵 Efectivo">💵 Efectivo</option>
            </select>
            <button class="btn" onclick="app.addMetodo()">Guardar Medio</button>
        </div>
    </div>

    <div id="view-gasto" class="view">
        <div class="header"><h1>Nuevo Gasto</h1></div>
        <div class="card">
            <input type="text" id="g-monto" class="currency-input" placeholder="0.00" oninput="app.mask(this)">
            
            <span class="label">¿En qué gastaste?</span>
            <select id="g-cat">
                <option value="🛒 Suministros">🛒 Suministros</option>
                <option value="🍕 Placeres">🍕 Placeres</option>
                <option value="🚗 Movilidad">🚗 Movilidad</option>
                <option value="🏠 Fijos">🏠 Fijos</option>
                <option value="👕 Personal">👕 Personal</option>
                <option value="🏥 Salud">🏥 Salud</option>
                <option value="🌀 Varios">🌀 Varios</option>
            </select>

            <span class="label">¿Con qué pagaste?</span>
            <div id="g-metodos-grid" class="selector-grid"></div>

            <button class="btn" onclick="app.saveTrx()">Confirmar Gasto</button>
            <button class="btn btn-sec" onclick="app.showView('view-main')">Cancelar</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxvFArEukaaW-AfcMh5lNWxRGK6pYOAGOWJe7J-wPND80vtLMYWWZOrE6kGrE6b3i5b/exec";

        const app = {
            user: null,
            data: null,
            selectedMetodo: null,

            toggleMenu: () => {
                document.getElementById('sidebar').classList.toggle('open');
                document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
            },

            showView: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            },

            mask: (el) => {
                let v = el.value.replace(/\D/g, "");
                if (!v) { el.value = ""; return; }
                el.value = (parseInt(v) / 100).toLocaleString('en-US', { minimumFractionDigits: 2 });
            },

            login: async function() {
                const email = document.getElementById('l-email').value;
                if(!email) return;
                document.getElementById('loader').style.display = 'flex';
                try {
                    const res = await fetch(`${API_URL}?userId=${email}`);
                    const json = await res.json();
                    if(json.success && json.user_info) {
                        this.user = { email, ...json.user_info };
                        localStorage.setItem('eq_user', JSON.stringify(this.user));
                        this.data = json;
                        this.render();
                        this.showView('view-main');
                    } else { alert("Usuario no encontrado."); }
                } catch(e) { alert("Error de conexión."); }
                document.getElementById('loader').style.display = 'none';
            },

            render: function() {
                const info = this.user;
                const trxs = this.data.transacciones || [];
                const metodos = this.data.metodos || [];

                document.getElementById('w-msg').innerText = `Hola, ${info.nombre}`;
                document.getElementById('t-date').innerText = new Date().toLocaleDateString('es-MX', { day:'numeric', month:'short' });

                // Lógica de cálculo (Realidad Inmediata)
                const hoy = new Date();
                const diaCorte = parseInt(info.corte);
                let corte = new Date(hoy.getFullYear(), hoy.getMonth(), diaCorte);
                if(hoy.getDate() >= diaCorte) corte.setMonth(corte.getMonth() + 1);
                const diasRestantes = Math.ceil((corte - hoy) / (1000 * 60 * 60 * 24));

                const gastado = trxs.reduce((a, b) => a + parseFloat(b.monto || 0), 0);
                const dispMes = parseFloat(info.ingreso) - parseFloat(info.meta);
                const dispReal = dispMes - gastado;
                const diario = (dispReal / diasRestantes).toFixed(2);

                document.getElementById('d-budget').innerText = `$${parseFloat(diario).toLocaleString()}`;
                document.getElementById('d-budget').style.color = diario < 0 ? 'var(--ios-red)' : 'var(--ios-green)';
                document.getElementById('v-savings').innerText = `$${parseFloat(info.meta).toLocaleString()}`;
                document.getElementById('v-available').innerText = `$${dispMes.toLocaleString()}`;
                document.getElementById('v-spent').innerText = `$${gastado.toLocaleString()}`;
                document.getElementById('c-info').innerText = `${diasRestantes} días para el corte (${diaCorte})`;
                document.getElementById('p-bar').style.width = Math.min((gastado / dispMes) * 100, 100) + "%";

                // Render Metodos en Sidebar y Gasto
                this.renderMetodosUI(metodos);
            },

            renderMetodosUI: function(metodos) {
                const grid = document.getElementById('g-metodos-grid');
                const list = document.getElementById('list-metodos');
                
                grid.innerHTML = metodos.map(m => `
                    <div class="sel-btn" onclick="app.selectMetodo(this, '${m.nombre}')">${m.nombre}</div>
                `).join('');

                list.innerHTML = metodos.map(m => `
                    <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                        <div><b>${m.nombre}</b><br><small style="color:var(--ios-gray)">${m.tipo}</small></div>
                        <div style="font-size:20px;">✓</div>
                    </div>
                `).join('');

                if(metodos.length === 0) {
                    grid.innerHTML = `<p style="font-size:12px; color:var(--ios-red); grid-column:1/-1;">⚠️ Ve a "Medios de Pago" para añadir tus tarjetas.</p>`;
                }
            },

            selectMetodo: (btn, name) => {
                document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                app.selectedMetodo = name;
            },

            addMetodo: async function() {
                const nombre = document.getElementById('m-nombre').value;
                if(!nombre) return;
                document.getElementById('loader').style.display = 'flex';
                await fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ action: "agregarMetodo", userId: this.user.email, nombre: nombre, tipo: document.getElementById('m-tipo').value }) 
                });
                document.getElementById('m-nombre').value = "";
                setTimeout(() => this.login(), 1500);
            },

            saveTrx: async function() {
                const monto = parseFloat(document.getElementById('g-monto').value.replace(/,/g, ""));
                if(!monto || !app.selectedMetodo) return alert("Ingresa monto y selecciona tarjeta.");

                document.getElementById('loader').style.display = 'flex';
                await fetch(API_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: JSON.stringify({ action: "registrarTransaccion", userId: this.user.email, monto, categoria: document.getElementById('g-cat').value, metodo: app.selectedMetodo, tipo: "Gasto", concepto: "App" }) 
                });
                document.getElementById('g-monto').value = "";
                setTimeout(() => this.login(), 1500);
            },

            logout: function() {
                if(confirm("¿Seguro que quieres cerrar sesión?")) { localStorage.clear(); location.reload(); }
            }
        };

        window.onload = () => {
            const saved = localStorage.getItem('eq_user');
            if(saved) {
                app.user = JSON.parse(saved);
                document.getElementById('l-email').value = app.user.email;
                app.login();
            }
        };
    </script>
</body>
</html>
